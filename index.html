<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8"/>
    <title>Frame Flow</title>
    <link rel="stylesheet" href="styles.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  </head>
  <body>
    <div class="post">

      <div class="post-header">
        <div class="post-user">
          <img class="profile-picture" src="pictures/yui.profile.jpg"/>
          <div class="user-info">
            <span class="username">yui_hirasawa</span>
            <span class="timestamp">&#183; 10 h</span>
          </div>
        </div>
        <button class="more-options">&#8943;</button>
      </div>

      <div class="carousel-pictures">
        <div class="carousel">
          <div class="slide"><img src="pictures/photography.jpg" alt="photo1"/></div>
          <div class="slide"><img src="pictures/homeworkpic.jpg" alt="photo2"/></div>
          <div class="slide"><img src="pictures/studypic.jpg" alt="photo3"/></div>
          <div class="slide"><img src="pictures/girlspic.jpg" alt="photo4"/></div>
          <div class="slide"><img src="pictures/k-onbags.jpg" alt="photo5"/></div>
          <div class="slide"><img src="pictures/girlssleep.jpg" alt="photo6"/></div>
        </div>

        <button class="prev">&#8249;</button>
        <button class="next">&#8250;</button>

        <div class="dots">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <div class="actions">
        <div class="actions-left">
          <i class="fa-regular fa-heart"></i>
          <i class="fa-regular fa-comment"></i>
          <i class="fa-solid fa-retweet"></i>
          <i class="fa-regular fa-paper-plane"></i>
        </div>
        <div class="actions-right">
          <i class="fa-regular fa-bookmark"></i>
        </div>
      </div>

      <div class="post-caption">
        <span class="username">yui_hirasawa</span>
        <span class="caption-text">Every day is always fun!!</span>
      </div>

    </div>

    <script src="script.js"></script>
  </body>
</html>
